name: "Bump Version & Tag"

# Triggered after a merge to dev or test.
# Reads bump type from CHANGELOG.md, increments version, commits, tags, and pushes.
# The [skip ci] in the commit message prevents this workflow from re-triggering itself.

on:
  push:
    branches:
      - dev
      - test

jobs:
  bump:
    # Skip commits made by this workflow (contain [skip ci])
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMP_TOKEN }}
          fetch-depth: 0  # Full history needed for back-merge

      - name: Verify BUMP_TOKEN identity
        run: |
          curl -s -H "Authorization: token ${{ secrets.BUMP_TOKEN }}" https://api.github.com/user | grep login

      - name: Check Token Presence
        run: |
          if [ -z "${{ secrets.BUMP_TOKEN }}" ]; then
            echo "::warning::BUMP_TOKEN is empty. Falling back to GITHUB_TOKEN. Pushed tags will NOT trigger release workflows."
          else
            echo "✅ BUMP_TOKEN is present."
          fi

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bump_version.py
        run: python bump_version.py --ci
